name: CI Retrain and Publish Model

on:
  push:
    branches: [main]
    paths:
      - 'MLProject/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: telco-churn-model

jobs:
  train-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda with Python 3.12.7
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.12.7'
          auto-activate-base: false
          activate-environment: msml-ci

      - name: Install MLflow and dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.5.2 pandas==2.2.3 numpy==1.26.4

      - name: Run MLflow Project
        run: |
          mlflow run MLProject --env-manager=local | tee train.log
          RUN_ID=$(grep -oE 'RUN_ID=[0-9a-f]+' train.log | tail -1 | cut -d= -f2)
          if [ -z "$RUN_ID" ]; then
            echo "RUN_ID tidak ditemukan pada keluaran pelatihan."
            exit 1
          fi
          echo "RUN_ID=$RUN_ID" >> "$GITHUB_ENV"
          echo "Model dilatih dengan run id: $RUN_ID"

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mlruns-${{ github.run_number }}
          path: mlruns/

      - name: Commit trained model to repository
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f mlruns/
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan artefak."
            exit 0
          fi
          git commit -m "chore: store trained model artifacts from CI run ${{ github.run_number }} [skip ci]"
          # Remote dapat bergerak di antara checkout dan push (misalnya karena
          # run lain atau push manual), sehingga push langsung bisa ditolak
          # non-fast-forward. Rebase lalu coba lagi beberapa kali.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push berhasil pada percobaan ke-$attempt."
              exit 0
            fi
            echo "Push ditolak, menarik perubahan remote lalu mencoba lagi..."
            git pull --rebase origin main
          done
          echo "Push tetap gagal setelah 3 percobaan."
          exit 1

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Dua penyesuaian penting pada perintah di bawah:
      #
      # 1. --env-manager local wajib. Tanpanya MLflow memakai virtualenv, yang
      #    memaksa base image ubuntu:20.04 dan memasang Python 3.9 lewat
      #    get-pip.py — dan get-pip.py sudah tidak mendukung Python 3.9 sehingga
      #    build selalu gagal. Dengan `local`, MLflow memakai base image
      #    python:3.12.7-slim sesuai versi Python model.
      #
      # 2. --enable-mlserver sengaja TIDAK dipakai. MLServer 1.3.5 yang dipin
      #    oleh MLflow 2.19.0 gagal pada Python 3.12 (asyncio.get_event_loop()
      #    melempar RuntimeError), sehingga worker inferensi mati dan model
      #    tidak pernah termuat. Server bawaan MLflow menyediakan /ping dan
      #    /invocations yang justru sesuai dengan bukti serving yang diminta.
      - name: Build Docker image with MLflow
        run: |
          mlflow models build-docker \
            --model-uri "runs:/$RUN_ID/model" \
            --name "${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME" \
            --env-manager local

      - name: Push image to Docker Hub
        run: |
          docker tag  "${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME" \
                      "${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:${{ github.run_number }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:latest"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:${{ github.run_number }}"

      - name: Summary
        run: |
          echo "### Hasil CI" >> "$GITHUB_STEP_SUMMARY"
          echo "- Run ID model: \`$RUN_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ secrets.DOCKERHUB_USERNAME }}/$IMAGE_NAME:latest\`" >> "$GITHUB_STEP_SUMMARY"
